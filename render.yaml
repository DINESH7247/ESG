services:
  - type: web
    name: esg-backend
    env: docker
    rootDir: backend
    plan: starter
    healthCheckPath: /records
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: esg-postgres
          property: connectionString

databases:
  - name: esg-postgres
    plan: starter
